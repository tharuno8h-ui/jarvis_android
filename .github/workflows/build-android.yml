name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools
          pip install buildozer==1.5.0 Cython==0.29.33 virtualenv

      - name: Build with Buildozer
        id: buildozer
        run: buildozer android debug > buildozer_output.log 2>&1

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer_output.log

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
